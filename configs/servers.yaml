# Remote GPU servers available for experiment orchestration.
# Secrets are intentionally excluded. Use SSH keys or a local secret store for passwords.
servers:
  esalab-big:
    kind: tailscale
    host: esalab-big.taild1b22.ts.net
    tailscale_ip: 100.69.221.87
    user: esalab
    project_dir: /home/esalab/Escritorio/instrumentos_portugueses_ir
    gpu:
      name: NVIDIA GeForce RTX 3090 Ti
      memory_gb: 24
    docker:
      compose_file: docker/docker-compose.gpu.yml
      vllm_image: vllm/vllm-openai:v0.10.1.1
      default_vlm_model_hf: Qwen/Qwen2.5-VL-3B-Instruct
      served_model_name: qwen2.5-vl
      vllm_max_model_len: 4096
      vllm_gpu_memory_utilization: 0.60
      vlm_max_image_side: 768
      vlm_jpeg_quality: 85
      vlm_workers: 8
      vlm_cache: true
      vlm_cache_dir: outputs/cache/vlm_openai

  mida-qwen36-27b:
    kind: tailscale
    host: esalab-mida
    tailscale_ip_from_esalab_big: 100.127.120.42
    tailscale_ip_from_local: 100.113.15.12
    user: esalab
    openai_base_url_from_esalab_big: http://100.127.120.42:8080/v1
    openai_base_url_from_local: http://100.113.15.12:8080/v1
    served_model_name: qwen36-27b
    model_repo: unsloth/Qwen3.6-27B-GGUF
    model_file: Qwen3.6-27B-Q4_K_M.gguf
    mmproj_file: mmproj-F16.gguf
    notes: >
      Image input requires llama-server to be started with --mmproj. The attached
      qwen36_27b_gpu0.sh defaults ENABLE_MMPROJ=0; if image requests return "image
      input is not supported", restart MIDA with ENABLE_MMPROJ=1.
