# Docker Compose GPU (ADR §11.2). Qdrant se omite (opcional); MLflow es file-store (sin servicio).
services:
  irlab:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/models/huggingface
      - TRANSFORMERS_CACHE=/models/huggingface
      - MLFLOW_TRACKING_URI=sqlite:////workspace/outputs/mlflow.db
      - EXPERIMENT_OFFLINE=${EXPERIMENT_OFFLINE:-false}
      - VLM_BASE_URL=${VLM_BASE_URL:-http://vlm-server:8001/v1}
      - VLM_MODEL=${VLM_MODEL:-qwen2.5-vl}
      - VLM_MAX_IMAGE_SIDE=${VLM_MAX_IMAGE_SIDE:-768}
      - VLM_JPEG_QUALITY=${VLM_JPEG_QUALITY:-85}
      - VLM_DISABLE_THINKING=${VLM_DISABLE_THINKING:-false}
      - VLM_EXTRA_BODY_JSON=${VLM_EXTRA_BODY_JSON:-}
      - VLM_WORKERS=${VLM_WORKERS:-1}
      - VLM_CACHE=${VLM_CACHE:-1}
      - VLM_CACHE_DIR=${VLM_CACHE_DIR:-outputs/cache/vlm_openai}
    volumes:
      - ../data:/workspace/data
      - ../outputs:/workspace/outputs
      - ../configs:/workspace/configs
      - ../models:/models
    ports:
      - "7860:7860"   # Gradio
      - "8000:8000"   # API
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  # Servidor VLM OpenAI-compatible (B4/B5). Sirve Qwen2.5-VL vía vLLM.
  vlm-server:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.10.1.1}
    runtime: nvidia
    command:
      - --model
      - ${VLM_MODEL_HF:-Qwen/Qwen2.5-VL-7B-Instruct}
      - --served-model-name
      - ${VLM_MODEL:-qwen2.5-vl}
      - --host
      - "0.0.0.0"
      - --port
      - "8001"
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-8192}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.80}
      - --enforce-eager
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/models/huggingface
    volumes:
      - ../models:/models
    ports:
      - "8001:8001"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
