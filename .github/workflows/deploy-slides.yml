name: Deploy Slidev to Pages

on:
  push:
    branches: [main]
    paths:
      - "slides/slidev/**"
      - ".github/workflows/deploy-slides.yml"
  workflow_dispatch:

# Allow this workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel an in-progress run
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slides/slidev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build slides
        # Relative base ("./") — an absolute base is applied twice by Slidev v52
        # (once to asset paths, once to router links) and breaks navigation on a
        # GitHub Pages subpath. Relative base + hash router works under /<repo>/.
        run: npm run build -- --base ./

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: slides/slidev/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
